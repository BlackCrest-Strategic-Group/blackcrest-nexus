services:
  govcon-ai-scanner:
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      NODE_ENV: production
  govcon-opportunity-intelligence:
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      FLASK_ENV: production
  govcon-intelligence:
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      FLASK_ENV: production