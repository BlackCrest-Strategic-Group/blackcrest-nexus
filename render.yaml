version: "3.8"
services:
  my-service:
    build:
      context: .
      dockerfile: Dockerfile
    command: ${startCommand}
    environment:
      - ${envVars}
    ports:
      - "8080:8080"
    deploy:
      replicas: 1
    networks:
      - my-network
    labels:
      com.example.label: "value"
