openapi: 3.0.3

info:
  title: GovCon AI Scanner API
  description: |
    # GovCon AI Scanner — REST API Reference

    The GovCon AI Scanner helps government contractors discover, analyze, and
    track opportunities from SAM.gov.  Use this API to integrate opportunity
    data into your ERP or build custom workflows.

    ## Authentication

    All protected endpoints require a **Bearer** access token obtained via
    `POST /api/auth/login`.  Tokens expire after **15 minutes**; use
    `POST /api/auth/refresh` with your refresh token to obtain a new pair.

    ```
    Authorization: Bearer <access_token>
    ```

    ## Rate Limiting

    | Endpoint group        | Limit                 |
    |-----------------------|-----------------------|
    | `/api/auth/*`         | 30 requests / 15 min  |
    | `/api/opportunities/*`| 200 requests / 15 min |
    | `/api/email*`         | 200 requests / 15 min |
    | `/api/admin/*`        | 60 requests / 15 min  |

    When exceeded the API returns **429 Too Many Requests** with:
    ```json
    { "success": false, "error": "Too many requests. Please try again later." }
    ```

    ## Error Codes

    | HTTP Code | Meaning |
    |-----------|---------|
    | 400       | Bad Request — missing or invalid fields |
    | 401       | Unauthorized — missing, expired, or invalid token |
    | 403       | Forbidden — valid token but insufficient permissions |
    | 404       | Not Found |
    | 409       | Conflict — e.g. email already registered |
    | 429       | Too Many Requests |
    | 500       | Internal Server Error |

    ## Webhooks (Stripe)

    Stripe sends signed webhook events to your server.  Events include:
    - `customer.subscription.created`
    - `customer.subscription.deleted`
    - `invoice.payment_succeeded`
    - `invoice.payment_failed`

    Validate the `Stripe-Signature` header using your `STRIPE_WEBHOOK_SECRET`
    before processing any event.

  version: "2.0.0"
  contact:
    name: GovCon AI Scanner Support
    email: support@govconscanner.com
  license:
    name: Proprietary

servers:
  - url: https://govcon-ai-scanner.onrender.com
    description: Production
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Auth
    description: Registration, login, token refresh
  - name: Opportunities
    description: SAM.gov search, document analysis, saved opportunities
  - name: Email
    description: Email preferences and daily digest
  - name: Admin – Users
    description: Admin user management (admin role required)
  - name: Admin – Analytics
    description: Admin analytics and insights (admin role required)
  - name: Admin – Subscriptions
    description: Admin subscription management (admin role required)
  - name: Admin – System
    description: Admin system health and operations (admin role required)
  - name: System
    description: Health check

# ---------------------------------------------------------------------------
# Security Schemes
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # -------------------------------------------------------------------------
  # Reusable Schemas
  # -------------------------------------------------------------------------
  schemas:

    User:
      type: object
      properties:
        id:
          type: string
          example: "64a7b2c3d4e5f6a7b8c9d0e1"
        email:
          type: string
          format: email
          example: "jane@example.com"
        name:
          type: string
          example: "Jane Smith"
        company:
          type: string
          example: "Acme Federal LLC"
        naicsCodes:
          type: array
          items:
            type: string
          example: ["541511", "541330"]
        role:
          type: string
          enum: [user, admin]
          example: user
        createdAt:
          type: string
          format: date-time

    TokenPair:
      type: object
      properties:
        accessToken:
          type: string
          description: Short-lived JWT (15 min)
        refreshToken:
          type: string
          description: Long-lived refresh token (7 days)

    Opportunity:
      type: object
      properties:
        noticeId:
          type: string
          example: "ABC123"
        title:
          type: string
          example: "IT Modernization Services"
        solicitationNumber:
          type: string
        agency:
          type: string
          example: "Department of Defense"
        office:
          type: string
        naicsCode:
          type: string
          example: "541511"
        pscCode:
          type: string
        setAside:
          type: string
          example: "Small Business"
        noticeType:
          type: string
        postedDate:
          type: string
          format: date
        responseDeadLine:
          type: string
          format: date-time
        uiLink:
          type: string
          format: uri
        bidScore:
          type: number
          minimum: 0
          maximum: 100
        recommendation:
          type: string
          enum: [BID, NO-BID, REVIEW]

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Descriptive error message"

  # -------------------------------------------------------------------------
  # Reusable Parameters
  # -------------------------------------------------------------------------
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    UserIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # ==========================================================================
  # AUTH
  # ==========================================================================

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: "jane@example.com"
                password:
                  type: string
                  minLength: 8
                  example: "Str0ng!Pass"
                name:
                  type: string
                  example: "Jane Smith"
                company:
                  type: string
                  example: "Acme Federal LLC"
                naicsCodes:
                  type: array
                  items:
                    type: string
                  example: ["541511"]
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/TokenPair"
                  - type: object
                    properties:
                      success:
                        type: boolean
                        example: true
                      user:
                        $ref: "#/components/schemas/User"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      x-code-samples:
        - lang: cURL
          source: |
            curl -X POST https://govcon-ai-scanner.onrender.com/api/auth/register \
              -H "Content-Type: application/json" \
              -d '{"email":"jane@example.com","password":"Str0ng!Pass","name":"Jane Smith"}'
        - lang: JavaScript
          source: |
            const res = await fetch('/api/auth/register', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email: 'jane@example.com', password: 'Str0ng!Pass' })
            });
            const { accessToken, user } = await res.json();
        - lang: Python
          source: |
            import requests
            r = requests.post('http://localhost:3000/api/auth/register',
                              json={'email': 'jane@example.com', 'password': 'Str0ng!Pass'})
            data = r.json()

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login and obtain tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/TokenPair"
                  - type: object
                    properties:
                      success:
                        type: boolean
                        example: true
                      user:
                        $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      x-code-samples:
        - lang: cURL
          source: |
            curl -X POST https://govcon-ai-scanner.onrender.com/api/auth/login \
              -H "Content-Type: application/json" \
              -d '{"email":"jane@example.com","password":"Str0ng!Pass"}'

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: New token pair issued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/TokenPair"
                  - type: object
                    properties:
                      success:
                        type: boolean
                        example: true
        "403":
          description: Invalid or expired refresh token

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout (invalidates refresh token)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out

  /api/auth/profile:
    get:
      tags: [Auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  user:
                    $ref: "#/components/schemas/User"
    patch:
      tags: [Auth]
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                company:
                  type: string
                naicsCodes:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Updated profile

  # ==========================================================================
  # OPPORTUNITIES
  # ==========================================================================

  /api/opportunities/search:
    post:
      tags: [Opportunities]
      summary: Search SAM.gov opportunities
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                postedFrom:
                  type: string
                  format: date
                  example: "2024-01-01"
                postedTo:
                  type: string
                  format: date
                  example: "2024-12-31"
                keyword:
                  type: string
                  example: "cybersecurity"
                naics:
                  type: string
                  example: "541511"
                psc:
                  type: string
                setAside:
                  type: string
                  example: "SBA"
                noticeType:
                  type: string
                  example: "Solicitation"
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 25
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Opportunity"
                  total:
                    type: integer
      x-code-samples:
        - lang: cURL
          source: |
            curl -X POST https://govcon-ai-scanner.onrender.com/api/opportunities/search \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"keyword":"cybersecurity","naics":"541511","postedFrom":"2024-01-01"}'
        - lang: JavaScript
          source: |
            const res = await fetch('/api/opportunities/search', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ keyword: 'cybersecurity', naics: '541511' })
            });
            const { data } = await res.json();
        - lang: Python
          source: |
            import requests
            r = requests.post('http://localhost:3000/api/opportunities/search',
                              headers={'Authorization': f'Bearer {token}'},
                              json={'keyword': 'cybersecurity', 'naics': '541511'})
            opportunities = r.json()['data']

  /api/opportunities:
    get:
      tags: [Opportunities]
      summary: Get saved opportunities for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Saved opportunities list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Opportunity"

  /api/opportunities/save:
    post:
      tags: [Opportunities]
      summary: Save an opportunity
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Opportunity"
      responses:
        "200":
          description: Opportunity saved

  /api/opportunities/analyze:
    post:
      tags: [Opportunities]
      summary: Analyze a document for bid scoring
      description: |
        Upload a PDF, DOCX, or TXT file.  The service parses the text,
        detects FAR/DFARS clauses, and returns a bid score (0-100) with a
        BID / NO-BID / REVIEW recommendation.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                document:
                  type: string
                  format: binary
                  description: PDF, DOCX, or TXT solicitation document
      responses:
        "200":
          description: Analysis results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  bidScore:
                    type: number
                  recommendation:
                    type: string
                    enum: [BID, NO-BID, REVIEW]
                  detectedClauses:
                    type: array
                    items:
                      type: string
      x-code-samples:
        - lang: cURL
          source: |
            curl -X POST https://govcon-ai-scanner.onrender.com/api/opportunities/analyze \
              -H "Authorization: Bearer $TOKEN" \
              -F "document=@/path/to/solicitation.pdf"
        - lang: Python
          source: |
            import requests
            with open('solicitation.pdf', 'rb') as f:
                r = requests.post('http://localhost:3000/api/opportunities/analyze',
                                  headers={'Authorization': f'Bearer {token}'},
                                  files={'document': f})
            result = r.json()

  # ==========================================================================
  # EMAIL
  # ==========================================================================

  /api/email-preferences:
    get:
      tags: [Email]
      summary: Get email preferences
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Email preferences

  /api/email-preferences/preferences/update:
    post:
      tags: [Email]
      summary: Update email preferences
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                frequency:
                  type: string
                  enum: [daily, weekly, never]
                deliveryTime:
                  type: integer
                  minimum: 0
                  maximum: 23
                naicsFilter:
                  type: array
                  items:
                    type: string
                minBidScore:
                  type: integer
                  minimum: 0
                  maximum: 100
      responses:
        "200":
          description: Preferences updated

  /api/email/send-daily-digest:
    post:
      tags: [Email]
      summary: Trigger a test daily digest email
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Email sent

  # ==========================================================================
  # ADMIN – USERS
  # ==========================================================================

  /api/admin/users:
    get:
      tags: [Admin – Users]
      summary: List all users
      description: Paginated, filterable list of all user accounts. **Admin only.**
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: search
          in: query
          description: Search by email, name, or company
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
            enum: [user, admin]
        - name: isActive
          in: query
          schema:
            type: boolean
        - name: sortBy
          in: query
          schema:
            type: string
            default: createdAt
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /api/admin/users/{id}:
    get:
      tags: [Admin – Users]
      summary: Get user details and usage stats
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: User detail
        "404":
          description: User not found

    patch:
      tags: [Admin – Users]
      summary: Update user (admin override)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                company:
                  type: string
                naicsCodes:
                  type: array
                  items:
                    type: string
                role:
                  type: string
                  enum: [user, admin]
                isActive:
                  type: boolean
      responses:
        "200":
          description: User updated

    delete:
      tags: [Admin – Users]
      summary: Deactivate user (soft delete)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: User deactivated

  /api/admin/users/{id}/activity:
    get:
      tags: [Admin – Users]
      summary: User activity log
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: Activity log

  # ==========================================================================
  # ADMIN – ANALYTICS
  # ==========================================================================

  /api/admin/dashboard:
    get:
      tags: [Admin – Analytics]
      summary: Key dashboard metrics
      description: |
        Returns MAU, new registrations, opportunity counts, email subscriptions,
        and month-over-month growth rate. **Admin only.**
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      users:
                        type: object
                      opportunities:
                        type: object
                      email:
                        type: object

  /api/admin/analytics/usage:
    get:
      tags: [Admin – Analytics]
      summary: Daily/weekly usage trends
      security:
        - bearerAuth: []
      parameters:
        - name: days
          in: query
          description: Number of days to look back (7–90)
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Usage trend data

  /api/admin/analytics/revenue:
    get:
      tags: [Admin – Analytics]
      summary: Subscription revenue breakdown
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Revenue analytics

  /api/admin/analytics/features:
    get:
      tags: [Admin – Analytics]
      summary: Feature usage statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Feature usage

  /api/admin/analytics/search-trends:
    get:
      tags: [Admin – Analytics]
      summary: Popular searches and NAICS codes
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Search trends

  # ==========================================================================
  # ADMIN – SUBSCRIPTIONS
  # ==========================================================================

  /api/admin/subscriptions:
    get:
      tags: [Admin – Subscriptions]
      summary: List all subscriptions
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
      responses:
        "200":
          description: Subscription list with MRR summary

  /api/admin/subscriptions/{userId}:
    get:
      tags: [Admin – Subscriptions]
      summary: Get user subscription details
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Subscription detail

  /api/admin/subscriptions/{userId}/extend-trial:
    post:
      tags: [Admin – Subscriptions]
      summary: Extend trial for a prospect
      description: Re-activates the user account. Use this during demo calls.
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                days:
                  type: integer
                  default: 30
                reason:
                  type: string
      responses:
        "200":
          description: Trial extended

  /api/admin/subscriptions/{userId}/issue-refund:
    post:
      tags: [Admin – Subscriptions]
      summary: Log a refund request
      description: |
        Records the refund request in the audit log.
        Process the actual refund in the **Stripe Dashboard**.
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                reason:
                  type: string
      responses:
        "200":
          description: Refund request logged

  # ==========================================================================
  # ADMIN – SYSTEM
  # ==========================================================================

  /api/admin/health/system:
    get:
      tags: [Admin – System]
      summary: Server metrics and uptime
      security:
        - bearerAuth: []
      responses:
        "200":
          description: System health metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [healthy, degraded]
                      uptime:
                        type: object
                      memory:
                        type: object
                      integrations:
                        type: object

  /api/admin/health/integrations:
    get:
      tags: [Admin – System]
      summary: Integration status (SAM API, Stripe, email)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Integration status

  /api/admin/logs:
    get:
      tags: [Admin – System]
      summary: System logs reference
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Log access instructions

  /api/admin/system/restart:
    post:
      tags: [Admin – System]
      summary: Initiate graceful server restart
      description: |
        Sends a `SIGTERM`-equivalent exit after flushing the response.
        Your process manager (PM2 / Render) should restart automatically.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Restart initiated

  # ==========================================================================
  # SYSTEM
  # ==========================================================================

  /health:
    get:
      tags: [System]
      summary: Health check (no auth required)
      responses:
        "200":
          description: Server is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  app:
                    type: string
                  env:
                    type: string
                  samConfigured:
                    type: boolean
                  mongoConfigured:
                    type: boolean
