<!doctype html><html><head><meta charset='utf-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/><title>Procurement Intelligence OS</title><link rel='stylesheet' href='/mvp-assets/styles.css'></head><body><div class='container'><header><h1>Procurement Intelligence OS</h1><p>Standalone + ERP-Ready</p><div class='subtle'>Enterprise Ready | ERP Optional | Global Capable</div><div class='controls'><button id='runDemo'>Run Demo Environment</button><label><input type='checkbox' id='erpToggle'/> ERP Mode</label><button id='refreshSuppliers'>Refresh Suppliers</button></div><div id='erpBadge' class='badge hidden'>Live ERP Data Connected · Enhanced insights enabled</div></header><section><h2>RFP Analysis</h2><form id='rfpForm'><textarea id='rfpText' placeholder='Paste RFP text'></textarea><input type='file' id='rfpFile' accept='.pdf'/><button>Upload RFP</button></form><div id='rfpOutput'></div></section><section><h2>Supplier Analysis</h2><label>Region <select id='regionFilter'><option value=''>All</option><option>US</option><option>EU</option><option>APAC</option></select></label><table id='supTable'><thead><tr><th>Name</th><th>Region</th><th>Cost Local</th><th>Cost USD</th><th>Lead Time</th><th>Capacity</th><th>Margin</th><th>Risk</th></tr></thead><tbody></tbody></table><div id='supplierHighlights'></div></section><section><h2>Add Supplier</h2><form id='addForm' class='grid'><input name='name' placeholder='Name' required><select name='region'><option>US</option><option>EU</option><option>APAC</option></select><input name='cost' type='number' placeholder='Cost' required><select name='currency'><option>USD</option><option>EUR</option></select><input name='leadTimeDays' type='number' placeholder='Lead Time Days' required><input name='capacity' type='number' placeholder='Capacity %' required><input name='marginPercent' type='number' placeholder='Margin %' required><button>Add Supplier</button></form></section><section><h2>Insights Engine</h2><div id='insights'></div></section></div><script src='/mvp-assets/app.js'></script></body></html>
