<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – GovCon AI Proposal Scanner</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      background: #f7fafe;
    }

    .login-card {
      background: #ffffff;
      border: 1px solid rgba(20, 36, 58, 0.12);
      border-radius: 18px;
      box-shadow: 0 10px 28px rgba(20, 36, 58, 0.08);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
    }

    .login-logo {
      display: block;
      width: 80px;
      height: auto;
      margin: 0 auto 16px;
    }

    .login-card h1 {
      text-align: center;
      font-size: 1.6rem;
      margin: 0 0 6px;
      color: #14243a;
    }

    .login-subtitle {
      text-align: center;
      color: #5d6b7c;
      margin: 0 0 28px;
      font-size: 0.95rem;
    }

    .login-tabs {
      display: flex;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #c8d5e6;
      margin-bottom: 24px;
    }

    .login-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      background: #f3f7fc;
      color: #14243a;
      font-weight: 700;
      cursor: pointer;
      border: none;
      font-size: 0.95rem;
      font-family: inherit;
    }

    .login-tab.active {
      background: #14243a;
      color: #ffffff;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .login-form label {
      font-weight: 700;
      color: #14243a;
      font-size: 0.9rem;
      margin-bottom: 4px;
      display: block;
    }

    .login-form input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #c8d5e6;
      background: #fbfdff;
      color: #14243a;
      font-size: 0.98rem;
      font-family: inherit;
      box-sizing: border-box;
    }

    .login-form input:focus {
      outline: none;
      border-color: #14243a;
      box-shadow: 0 0 0 2px rgba(20, 36, 58, 0.08);
    }

    .login-btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: #14243a;
      color: #ffffff;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 6px;
    }

    .login-btn:hover {
      filter: brightness(1.15);
    }

    .login-error {
      display: none;
      background: #fdf2f2;
      border: 1px solid #f5c6c6;
      color: #a63c3c;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.93rem;
      font-weight: 700;
    }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      color: #5d6b7c;
      font-size: 0.88rem;
    }

    .register-fields {
      display: none;
      flex-direction: column;
      gap: 14px;
    }

    .register-fields.visible {
      display: flex;
    }

    .naics-list {
      max-height: 176px;
      overflow-y: auto;
      border: 1px solid #c8d5e6;
      border-radius: 12px;
      padding: 8px;
      background: #fbfdff;
    }

    .naics-list label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: normal;
      font-size: 0.88rem;
      color: #14243a;
      margin-bottom: 0;
    }

    .naics-list label:hover {
      background: rgba(20, 36, 58, 0.05);
    }

    .naics-list input[type="checkbox"] {
      width: auto;
      padding: 0;
      accent-color: #14243a;
    }

    .naics-help {
      font-size: 0.82rem;
      color: #5d6b7c;
      margin-bottom: 6px;
      display: block;
    }

    .naics-count {
      font-size: 0.82rem;
      color: #9a7724;
      margin-top: 4px;
      display: none;
    }
  </style>
</head>
<body>
  <div id="credentials-wrap" class="login-wrap">
    <div class="login-card">
      <img src="/assets/logo.png" alt="GovCon AI Scanner logo" class="login-logo" onerror="this.style.display='none'" />
      <h1>GovCon AI Scanner</h1>
      <p class="login-subtitle">Sign in to access your proposal dashboard</p>

      <div class="login-tabs">
        <button class="login-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="login-tab" id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <div id="error-msg" class="login-error" role="alert"></div>

      <form class="login-form" id="login-form" onsubmit="handleSubmit(event)">
        <div class="register-fields" id="register-extra">
          <div>
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Jane Smith" autocomplete="name" />
          </div>
          <div>
            <label for="company">Company (optional)</label>
            <input type="text" id="company" name="company" placeholder="Acme Corp" autocomplete="organization" />
          </div>
          <div>
            <label for="naics-section">NAICS Codes <span style="font-weight:normal;color:#5d6b7c">(optional — improves opportunity matching)</span></label>
            <span class="naics-help">Select the industry codes that best describe your business to surface the most relevant federal opportunities.</span>
            <div class="naics-list" id="naics-list">
              <label><input type="checkbox" value="238290" onchange="updateNaicsCount()" /> 238290 – Other Building Equipment Contractors</label>
              <label><input type="checkbox" value="332710" onchange="updateNaicsCount()" /> 332710 – Machine Shops</label>
              <label><input type="checkbox" value="336411" onchange="updateNaicsCount()" /> 336411 – Aircraft Manufacturing</label>
              <label><input type="checkbox" value="541330" onchange="updateNaicsCount()" /> 541330 – Engineering Services</label>
              <label><input type="checkbox" value="541511" onchange="updateNaicsCount()" /> 541511 – Custom Computer Programming</label>
              <label><input type="checkbox" value="541512" onchange="updateNaicsCount()" /> 541512 – Computer Systems Design</label>
              <label><input type="checkbox" value="541513" onchange="updateNaicsCount()" /> 541513 – Computer Facilities Management</label>
              <label><input type="checkbox" value="541519" onchange="updateNaicsCount()" /> 541519 – Other Computer-Related Services</label>
              <label><input type="checkbox" value="541611" onchange="updateNaicsCount()" /> 541611 – Management Consulting</label>
              <label><input type="checkbox" value="541690" onchange="updateNaicsCount()" /> 541690 – Other Scientific &amp; Technical Consulting</label>
              <label><input type="checkbox" value="541990" onchange="updateNaicsCount()" /> 541990 – All Other Professional Services</label>
              <label><input type="checkbox" value="561110" onchange="updateNaicsCount()" /> 561110 – Office Administrative Services</label>
              <label><input type="checkbox" value="561210" onchange="updateNaicsCount()" /> 561210 – Facilities Support Services</label>
              <label><input type="checkbox" value="611430" onchange="updateNaicsCount()" /> 611430 – Professional &amp; Management Training</label>
            </div>
            <span class="naics-count" id="naics-count"></span>
          </div>
        </div>

        <div>
          <label for="email">Email Address</label>
          <input type="text" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div>
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>

        <button type="submit" class="login-btn" id="submit-btn">Sign In</button>
      </form>

      <p class="login-footer">GovCon AI Proposal Scanner &copy; 2025</p>
    </div>
  </div>

  <!-- MFA verification panel — hidden until required -->
  <div id="mfa-wrap" class="login-wrap" style="display:none;">
    <div class="login-card">
      <img src="/assets/logo.png" alt="GovCon AI Scanner logo" class="login-logo" onerror="this.style.display='none'" />
      <h1>Two-Factor Authentication</h1>
      <p class="login-subtitle" id="mfa-subtitle">Enter the 6-digit code from your authenticator app.</p>

      <div id="mfa-error-msg" class="login-error" role="alert"></div>

      <form class="login-form" id="mfa-form" onsubmit="handleMfaSubmit(event)">
        <div>
          <label for="otp-code">Authenticator Code</label>
          <input type="text" id="otp-code" name="otp" placeholder="000000" maxlength="6" autocomplete="one-time-code" inputmode="numeric" pattern="\d{6}" required />
        </div>
        <button type="submit" class="login-btn" id="mfa-submit-btn">Verify</button>
      </form>

      <p style="text-align:center;margin-top:16px;">
        <button onclick="cancelMfa()" style="background:none;border:none;color:#5d6b7c;font-size:0.88rem;cursor:pointer;font-family:inherit;">← Back to Sign In</button>
      </p>
    </div>
  </div>

  <script>
    var currentMode = "login";
    // Stored between the credentials step and the MFA step
    var pendingMfaToken = null;
    var pendingMfaMethod = null;

    function updateNaicsCount() {
      var checkboxes = document.querySelectorAll("#naics-list input[type='checkbox']:checked");
      var countEl = document.getElementById("naics-count");
      if (checkboxes.length > 0) {
        countEl.textContent = checkboxes.length + " code" + (checkboxes.length !== 1 ? "s" : "") + " selected";
        countEl.style.display = "block";
      } else {
        countEl.style.display = "none";
      }
    }

    function getSelectedNaicsCodes() {
      var checkboxes = document.querySelectorAll("#naics-list input[type='checkbox']:checked");
      return Array.from(checkboxes).map(function(cb) { return cb.value; });
    }

    function switchTab(mode) {
      currentMode = mode;
      document.getElementById("tab-login").classList.toggle("active", mode === "login");
      document.getElementById("tab-register").classList.toggle("active", mode === "register");
      var extra = document.getElementById("register-extra");
      if (mode === "register") {
        extra.classList.add("visible");
      } else {
        extra.classList.remove("visible");
      }
      document.getElementById("submit-btn").textContent = mode === "login" ? "Sign In" : "Create Account";
      document.getElementById("password").setAttribute("autocomplete", mode === "login" ? "current-password" : "new-password");
      clearError();
    }

    function showError(msg) {
      var el = document.getElementById("error-msg");
      el.textContent = msg;
      el.style.display = "block";
    }

    function clearError() {
      var el = document.getElementById("error-msg");
      el.textContent = "";
      el.style.display = "none";
    }

    function showMfaError(msg) {
      var el = document.getElementById("mfa-error-msg");
      el.textContent = msg;
      el.style.display = "block";
    }

    function clearMfaError() {
      var el = document.getElementById("mfa-error-msg");
      el.textContent = "";
      el.style.display = "none";
    }

    function saveAuthTokens(data) {
      // Use the same storage keys as the React app (frontend/src/utils/auth.js)
      if (data.accessToken) {
        sessionStorage.setItem("govcon_access_token", data.accessToken);
      }
      if (data.refreshToken) {
        sessionStorage.setItem("govcon_refresh_token", data.refreshToken);
      }
      if (data.user) {
        sessionStorage.setItem("govcon_user", JSON.stringify(data.user));
      }
    }

    function showMfaPanel(mfaToken, mfaMethod) {
      pendingMfaToken = mfaToken;
      pendingMfaMethod = mfaMethod;
      var subtitle = document.getElementById("mfa-subtitle");
      if (mfaMethod === "totp") {
        subtitle.textContent = "Enter the 6-digit code from your authenticator app.";
      } else if (mfaMethod === "email") {
        subtitle.textContent = "Enter the 6-digit code sent to your email address.";
      } else if (mfaMethod === "sms") {
        subtitle.textContent = "Enter the 6-digit code sent to your phone.";
      } else {
        subtitle.textContent = "Enter the 6-digit verification code.";
      }
      document.getElementById("credentials-wrap").style.display = "none";
      document.getElementById("mfa-wrap").style.display = "flex";
      document.getElementById("otp-code").focus();
    }

    function cancelMfa() {
      pendingMfaToken = null;
      pendingMfaMethod = null;
      clearMfaError();
      document.getElementById("mfa-wrap").style.display = "none";
      document.getElementById("credentials-wrap").style.display = "flex";
    }

    async function handleMfaSubmit(e) {
      e.preventDefault();
      clearMfaError();
      var btn = document.getElementById("mfa-submit-btn");
      var otp = document.getElementById("otp-code").value.trim();

      if (!/^\d{6}$/.test(otp)) {
        showMfaError("Please enter the 6-digit code.");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Verifying…";

      try {
        var res = await fetch("/api/auth/verify-mfa-login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ mfaToken: pendingMfaToken, method: pendingMfaMethod, otp: otp })
        });

        var data = await res.json();

        if (!res.ok || !data.success) {
          showMfaError(data.error || "Invalid code. Please try again.");
          return;
        }

        saveAuthTokens(data);
        window.location.replace("/dashboard");
      } catch (err) {
        showMfaError("Unable to connect. Please try again.");
      } finally {
        btn.disabled = false;
        btn.textContent = "Verify";
      }
    }

    async function handleSubmit(e) {
      e.preventDefault();
      clearError();
      var btn = document.getElementById("submit-btn");
      var email = document.getElementById("email").value.trim();
      var password = document.getElementById("password").value;

      if (!email || !password) {
        showError("Email and password are required.");
        return;
      }

      var payload = { email: email, password: password };
      if (currentMode === "register") {
        var name = document.getElementById("name").value.trim();
        var company = document.getElementById("company").value.trim();
        if (!name) {
          showError("Full name is required.");
          return;
        }
        payload.name = name;
        if (company) payload.company = company;
        var naicsCodes = getSelectedNaicsCodes();
        if (naicsCodes.length > 0) payload.naicsCodes = naicsCodes;
      }

      btn.disabled = true;
      btn.textContent = currentMode === "login" ? "Signing in…" : "Creating account…";

      try {
        var url = currentMode === "login" ? "/api/auth/login" : "/api/auth/register";
        var res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify(payload)
        });

        var data = await res.json();

        if (!res.ok || !data.success) {
          showError(data.error || "Authentication failed. Please try again.");
          return;
        }

        // MFA challenge required — show the OTP verification panel
        if (data.requiresMfa) {
          showMfaPanel(data.mfaToken, data.mfaMethod);
          return;
        }

        // First-time MFA setup required — redirect to the React app's MFA setup page
        if (data.requiresMfaSetup) {
          // Store the setup token temporarily so the React login page can pick it up
          // by redirecting the user to /login which will handle the TOTP setup flow.
          window.location.replace("/login?mfaSetupToken=" + encodeURIComponent(data.mfaSetupToken));
          return;
        }

        saveAuthTokens(data);
        window.location.replace("/dashboard");
      } catch (err) {
        showError("Unable to connect. Please try again.");
      } finally {
        btn.disabled = false;
        btn.textContent = currentMode === "login" ? "Sign In" : "Create Account";
      }
    }
  </script>
</body>
</html>
