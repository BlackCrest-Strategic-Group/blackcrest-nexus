name: BlackCrest Nexus CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Clean Dependency State
        run: |
          rm -rf node_modules
          rm -rf client/node_modules
          rm -rf server/node_modules

      - name: Install Root Dependencies
        run: npm install --legacy-peer-deps

      - name: Install Client Dependencies
        run: npm install --prefix client --legacy-peer-deps

      - name: Install Server Dependencies
        run: npm install --prefix server --legacy-peer-deps

      - name: Validate Prisma Schema
        run: npx prisma validate --schema=server/prisma/schema.prisma

      - name: Generate Prisma Client
        run: npx prisma generate --schema=server/prisma/schema.prisma

      - name: Backend Syntax Validation
        run: node --check server/server.js

      - name: Frontend Production Build
        run: npm run build --prefix client

      - name: Validate Frontend Dist
        run: |
          if [ ! -f client/dist/index.html ]; then
            echo "Frontend build failed. dist/index.html missing"
            exit 1
          fi

      - name: Migration Script Syntax Check
        run: |
          if [ -f server/scripts/migrateTenantScoping.js ]; then
            node --check server/scripts/migrateTenantScoping.js
          else
            echo "Migration script not present. Skipping."
          fi
